name: Validate EchoMinutes

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

permissions:
  contents: read

jobs:
  cross-platform-core:
    name: Core tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.422

      - name: Restore cross-platform tests
        shell: pwsh
        run: |
          dotnet restore tests/MeetingTransfer.Tests/MeetingTransfer.Tests.csproj `
            -p:NuGetAudit=true -p:NuGetAuditMode=all `
            '-warnaserror:NU1901;NU1902;NU1903;NU1904'

      - name: Run cross-platform tests
        shell: pwsh
        run: |
          dotnet test tests/MeetingTransfer.Tests/MeetingTransfer.Tests.csproj `
            -c Release --no-restore

  windows-application:
    name: Windows application and WPF smoke tests
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.422

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore MeetingTransfer.sln `
            -p:NuGetAudit=true -p:NuGetAuditMode=all `
            '-warnaserror:NU1901;NU1902;NU1903;NU1904'

      - name: Build and test
        shell: pwsh
        run: |
          dotnet build MeetingTransfer.sln -c Release --no-restore
          dotnet test MeetingTransfer.sln -c Release --no-build --no-restore
