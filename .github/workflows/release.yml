name: Release EchoMinutes

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.422

      - name: Validate release tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
            throw "Release tags must use the formal vMAJOR.MINOR.PATCH format; received '$tag'."
          }
          [IO.File]::AppendAllText(
            $env:GITHUB_ENV,
            "RELEASE_VERSION=$($Matches.version)`n",
            [Text.UTF8Encoding]::new($false))

      - name: Prepare release notes
        shell: pwsh
        run: ./scripts/Get-ReleaseNotes.ps1 -Version $env:RELEASE_VERSION

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore MeetingTransfer.sln `
            -p:NuGetAudit=true -p:NuGetAuditMode=all `
            '-warnaserror:NU1901;NU1902;NU1903;NU1904'

      - name: Build and test
        shell: pwsh
        run: |
          $version = $env:RELEASE_VERSION
          dotnet build MeetingTransfer.sln -c Release --no-restore -p:Version=$version
          dotnet test MeetingTransfer.sln -c Release --no-build --no-restore -p:Version=$version

      - name: Publish clean Windows package
        shell: pwsh
        run: |
          $version = $env:RELEASE_VERSION
          dotnet restore src/MeetingTransfer.App/MeetingTransfer.App.csproj `
            -r win-x64 -p:Version=$version `
            -p:NuGetAudit=true -p:NuGetAuditMode=all `
            '-warnaserror:NU1901;NU1902;NU1903;NU1904'
          dotnet publish src/MeetingTransfer.App/MeetingTransfer.App.csproj `
            -c Release -r win-x64 --self-contained false --no-restore `
            -p:Version=$version -o artifacts/publish

          $modelExtensions = @('.onnx', '.gguf', '.bin', '.safetensors', '.pt', '.pth', '.tflite', '.ckpt', '.model')
          $weights = Get-ChildItem artifacts/publish -Recurse -File | Where-Object {
            $_.Extension -in $modelExtensions -or $_.Name -eq 'tokens.txt'
          }
          if ($weights) {
            $weights.FullName | Write-Error
            throw "Release package contains model weights."
          }

          $runtimeData = @('appsettings.json', 'models.json', 'data', 'recordings', 'exports') |
            ForEach-Object { Join-Path 'artifacts/publish' $_ } |
            Where-Object { Test-Path -LiteralPath $_ }
          if ($runtimeData) {
            $runtimeData | Write-Error
            throw "Release package contains runtime user data."
          }

          $debugSymbols = Get-ChildItem artifacts/publish -Recurse -File -Filter '*.pdb'
          if ($debugSymbols) {
            $debugSymbols.FullName | Write-Error
            throw "Release package contains debug symbols."
          }

          $versionedAssemblies = @(
            'MeetingTransfer.App.dll',
            'MeetingTransfer.Core.dll',
            'Updater/EchoMinutes.Updater.dll'
          )
          foreach ($relativePath in $versionedAssemblies) {
            $assemblyPath = Join-Path 'artifacts/publish' $relativePath
            if (-not (Test-Path -LiteralPath $assemblyPath)) {
              throw "Release package is missing $relativePath."
            }
            $assemblyVersion = [Reflection.AssemblyName]::GetAssemblyName(
              (Resolve-Path -LiteralPath $assemblyPath)).Version.ToString(3)
            if ($assemblyVersion -ne $version) {
              throw "$relativePath has version $assemblyVersion; expected $version."
            }
          }

          $requiredLicenses = @(
            'FFmpeg-GPL-3.0.txt',
            'whisper.cpp-MIT.txt',
            'sherpa-onnx-Apache-2.0.txt',
            'ONNX-Runtime-MIT.txt',
            'NAudio-MIT.txt',
            'SharpCompress-MIT.txt',
            'Microsoft-dotnet-MIT.txt',
            'SQLitePCLRaw-Apache-2.0.txt',
            'SQLite-Public-Domain.txt'
          )
          $missingLicenses = $requiredLicenses | Where-Object {
            -not (Test-Path -LiteralPath (Join-Path 'artifacts/publish/Licenses' $_))
          }
          if ($missingLicenses) {
            $missingLicenses | Write-Error
            throw "Release package is missing third-party license texts."
          }

          Compress-Archive -Path artifacts/publish/* -DestinationPath artifacts/echo-minutes-win-x64.zip -CompressionLevel Optimal
          $hash = (Get-FileHash artifacts/echo-minutes-win-x64.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          [IO.File]::WriteAllText(
            (Join-Path $PWD 'artifacts/echo-minutes-win-x64.zip.sha256'),
            "$hash  echo-minutes-win-x64.zip`n",
            [Text.UTF8Encoding]::new($false))

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = $env:RELEASE_VERSION
          $compiler = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          & $compiler "/DMyAppVersion=$version" installer/EchoMinutes.iss
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup failed with exit code $LASTEXITCODE."
          }

          $installer = 'artifacts/echo-minutes-setup-x64.exe'
          if (-not (Test-Path -LiteralPath $installer)) {
            throw "The Windows installer was not generated."
          }

          $installerVersion = (Get-Item -LiteralPath $installer).VersionInfo.ProductVersion.Trim()
          if ($installerVersion -ne $version) {
            throw "Installer has version $installerVersion; expected $version."
          }

          $hash = (Get-FileHash $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          [IO.File]::WriteAllText(
            (Join-Path $PWD 'artifacts/echo-minutes-setup-x64.exe.sha256'),
            "$hash  echo-minutes-setup-x64.exe`n",
            [Text.UTF8Encoding]::new($false))

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: false
          body_path: artifacts/release-notes.md
          files: |
            artifacts/echo-minutes-win-x64.zip
            artifacts/echo-minutes-win-x64.zip.sha256
            artifacts/echo-minutes-setup-x64.exe
            artifacts/echo-minutes-setup-x64.exe.sha256
