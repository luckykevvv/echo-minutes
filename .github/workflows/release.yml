name: Release EchoMinutes

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.422

      - name: Restore
        run: dotnet restore MeetingTransfer.sln

      - name: Build and test
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          dotnet build MeetingTransfer.sln -c Release --no-restore -p:Version=$version
          dotnet test MeetingTransfer.sln -c Release --no-build --no-restore -p:Version=$version

      - name: Publish clean Windows package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          dotnet restore src/MeetingTransfer.App/MeetingTransfer.App.csproj `
            -r win-x64 -p:Version=$version
          dotnet publish src/MeetingTransfer.App/MeetingTransfer.App.csproj `
            -c Release -r win-x64 --self-contained false --no-restore `
            -p:Version=$version -o artifacts/publish

          $modelExtensions = @('.onnx', '.gguf', '.bin', '.safetensors', '.pt', '.pth', '.tflite', '.ckpt', '.model')
          $weights = Get-ChildItem artifacts/publish -Recurse -File | Where-Object { $_.Extension -in $modelExtensions }
          if ($weights) {
            $weights.FullName | Write-Error
            throw "Release package contains model weights."
          }

          $runtimeData = @('appsettings.json', 'models.json', 'data', 'recordings', 'exports') |
            ForEach-Object { Join-Path 'artifacts/publish' $_ } |
            Where-Object { Test-Path -LiteralPath $_ }
          if ($runtimeData) {
            $runtimeData | Write-Error
            throw "Release package contains runtime user data."
          }

          Compress-Archive -Path artifacts/publish/* -DestinationPath artifacts/echo-minutes-win-x64.zip -CompressionLevel Optimal
          $hash = (Get-FileHash artifacts/echo-minutes-win-x64.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          [IO.File]::WriteAllText(
            (Join-Path $PWD 'artifacts/echo-minutes-win-x64.zip.sha256'),
            "$hash  echo-minutes-win-x64.zip`n",
            [Text.UTF8Encoding]::new($false))

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $compiler = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          & $compiler "/DMyAppVersion=$version" installer/EchoMinutes.iss
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup failed with exit code $LASTEXITCODE."
          }

          $installer = 'artifacts/echo-minutes-setup-x64.exe'
          if (-not (Test-Path -LiteralPath $installer)) {
            throw "The Windows installer was not generated."
          }

          $hash = (Get-FileHash $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          [IO.File]::WriteAllText(
            (Join-Path $PWD 'artifacts/echo-minutes-setup-x64.exe.sha256'),
            "$hash  echo-minutes-setup-x64.exe`n",
            [Text.UTF8Encoding]::new($false))

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/echo-minutes-win-x64.zip
            artifacts/echo-minutes-win-x64.zip.sha256
            artifacts/echo-minutes-setup-x64.exe
            artifacts/echo-minutes-setup-x64.exe.sha256
